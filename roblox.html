<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NovaBlocks v3.5.2</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
}

#canvas{
width:100vw;
height:100vh;
display:block;
touch-action:none;
}

/* JOYSTICK */
#joyBase{
position:absolute;
bottom:40px;
left:40px;
width:130px;
height:130px;
background:rgba(0,0,0,0.2);
border-radius:50%;
}

#joyStick{
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
top:40px;
left:40px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="joyBase">
  <div id="joyStick"></div>
</div>

<script>

const canvas = document.getElementById("canvas");
const engine = new BABYLON.Engine(canvas,true);
const scene = new BABYLON.Scene(engine);

/* LIGHT */
new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

/* GROUND */
BABYLON.MeshBuilder.CreateGround("g",{width:50,height:50},scene);

/* PLAYER */
const player = BABYLON.MeshBuilder.CreateBox("p",{size:1},scene);
player.position.y = 1;

/* CAMERA (FPS STYLE) */
const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0,2,0), scene);

/* LOOK CONTROL */
let rotY = 0;
let lastX = 0;

/* JOYSTICK */
const base = document.getElementById("joyBase");
const stick = document.getElementById("joyStick");

let dx = 0;
let dz = 0;
let active = false;

/* LOOK (SAĞ-SOL) */
canvas.addEventListener("touchstart",(e)=>{
lastX = e.touches[0].clientX;
});

canvas.addEventListener("touchmove",(e)=>{

let t = e.touches[0];
rotY -= (t.clientX - lastX) * 0.002;
lastX = t.clientX;

camera.rotation.y = rotY;

});

/* JOYSTICK */
base.addEventListener("touchstart",()=>active=true);

base.addEventListener("touchend",()=>{
active=false;
dx=0;
dz=0;
stick.style.left="40px";
stick.style.top="40px";
});

base.addEventListener("touchmove",(e)=>{

if(!active) return;

let t = e.touches[0];
let r = base.getBoundingClientRect();

let x = t.clientX - r.left - 65;
let y = t.clientY - r.top - 65;

let len = Math.sqrt(x*x+y*y);
if(len>40){
x=x/len*40;
y=y/len*40;
}

stick.style.left = (40+x)+"px";
stick.style.top = (40+y)+"px";

dx = x/40;
dz = -y/40;

});

/* LOOP */
engine.runRenderLoop(()=>{

/* movement relative to camera */
let forwardX = Math.sin(rotY);
let forwardZ = Math.cos(rotY);

let rightX = Math.cos(rotY);
let rightZ = -Math.sin(rotY);

player.position.x += (forwardX * dz + rightX * dx) * 0.15;
player.position.z += (forwardZ * dz + rightZ * dx) * 0.15;

/* camera follow */
camera.position.x = player.position.x;
camera.position.y = player.position.y + 1;
camera.position.z = player.position.z - 5;

scene.render();

});

window.addEventListener("resize",()=>engine.resize());

</script>

</body>
</html>
