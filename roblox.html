<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>NovaBlocks v3.7</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#87CEEB;
}

#canvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
touch-action:none;
display:block;
}

/* JOYSTICK CORE */
#joyBase{
position:absolute;
bottom:40px;
left:40px;
width:130px;
height:130px;
background:rgba(0,0,0,0.2);
border-radius:50%;
}

#joyStick{
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
top:40px;
left:40px;
}

/* CHAT CORE */
#chat{
position:absolute;
top:10px;
left:10px;
width:200px;
height:150px;
overflow:auto;
background:rgba(0,0,0,0.4);
color:white;
font-size:12px;
padding:5px;
}

#chatBox{
position:absolute;
bottom:10px;
left:10px;
display:flex;
gap:5px;
}

#input{width:140px;}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="chat"></div>

<div id="chatBox">
<input id="input" placeholder="chat...">
<button id="send">Send</button>
</div>

<div id="joyBase">
  <div id="joyStick"></div>
</div>

<script>

/* =========================
   CORE INIT (RENDER SAFE)
========================= */

const socket = io();
socket.emit("join","Player_"+Math.floor(Math.random()*999));

const canvas = document.getElementById("canvas");
const engine = new BABYLON.Engine(canvas,true);
const scene = new BABYLON.Scene(engine);

scene.clearColor = new BABYLON.Color4(0.53,0.81,0.92,1);

/* LIGHT */
new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

/* WORLD */
BABYLON.MeshBuilder.CreateGround("g",{width:50,height:50},scene);

/* PLAYER CORE */
const player = BABYLON.MeshBuilder.CreateBox("p",{size:1},scene);
player.position.y = 2;

/* CAMERA CORE */
const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0,2,0), scene);
camera.minZ = 0.1;

/* =========================
   ADD-ON: LOOK SYSTEM
========================= */

let rotY = 0;
let lastX = 0;

canvas.addEventListener("touchstart",(e)=>{
lastX = e.touches[0].clientX;
});

canvas.addEventListener("touchmove",(e)=>{

let t = e.touches[0];
rotY -= (t.clientX - lastX) * 0.002;
lastX = t.clientX;

camera.rotation.y = rotY;

});

/* =========================
   ADD-ON: JOYSTICK
========================= */

const base = document.getElementById("joyBase");
const stick = document.getElementById("joyStick");

let dx=0,dz=0,active=false;

base.addEventListener("touchstart",()=>active=true);

base.addEventListener("touchend",()=>{
active=false;
dx=0;dz=0;
stick.style.left="40px";
stick.style.top="40px";
});

base.addEventListener("touchmove",(e)=>{

if(!active) return;

let t = e.touches[0];
let r = base.getBoundingClientRect();

let x = t.clientX - r.left - 65;
let y = t.clientY - r.top - 65;

let len = Math.sqrt(x*x+y*y);
if(len>40){x=x/len*40;y=y/len*40;}

stick.style.left=(40+x)+"px";
stick.style.top=(40+y)+"px";

dx = x/40;
dz = -y/40;

});

/* =========================
   ADD-ON: MULTIPLAYER
========================= */

let others = {};

socket.on("init",(data)=>{

for(let id in data){
if(id === socket.id) continue;

let b = BABYLON.MeshBuilder.CreateBox(id,{size:1},scene);
others[id] = b;
}

});

socket.on("update",(d)=>{

if(others[d.id]){
others[d.id].position.x = d.data.x;
others[d.id].position.y = d.data.y;
others[d.id].position.z = d.data.z;
}

});

/* =========================
   ADD-ON: CHAT
========================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

send.onclick = ()=>{
if(input.value.trim()!==""){
socket.emit("chat",input.value);
input.value="";
}
};

socket.on("chat",(d)=>{
let div=document.createElement("div");
div.innerText=d.id+": "+d.msg;
chat.appendChild(div);
});

/* =========================
   ADD-ON: BLOCK PLACE
========================= */

window.addEventListener("click",()=>{

let b = BABYLON.MeshBuilder.CreateBox("b",{size:1},scene);
b.position.x = player.position.x;
b.position.y = player.position.y - 1;
b.position.z = player.position.z;

});

/* =========================
   CORE LOOP (RENDER SAFE)
========================= */

engine.runRenderLoop(()=>{

let forwardX = Math.sin(rotY);
let forwardZ = Math.cos(rotY);

let rightX = Math.cos(rotY);
let rightZ = -Math.sin(rotY);

player.position.x += (forwardX * dz + rightX * dx) * 0.15;
player.position.z += (forwardZ * dz + rightZ * dx) * 0.15;

camera.position.x = player.position.x;
camera.position.y = player.position.y + 1;
camera.position.z = player.position.z;

scene.render();

});

window.addEventListener("resize",()=>engine.resize());

</script>

</body>
</html>
