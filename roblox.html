<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>NovaBlocks v3.8</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#87CEEB;
}

#canvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
touch-action:none;
display:block;
}

/* JOYSTICK */
#joyBase{
position:absolute;
bottom:40px;
left:40px;
width:130px;
height:130px;
background:rgba(0,0,0,0.2);
border-radius:50%;
}

#joyStick{
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
top:40px;
left:40px;
}

/* CHAT */
#chat{
position:absolute;
top:10px;
left:10px;
width:200px;
height:150px;
overflow:auto;
background:rgba(0,0,0,0.4);
color:white;
font-size:12px;
padding:5px;
}

#chatBox{
position:absolute;
bottom:10px;
left:10px;
display:flex;
gap:5px;
}

#input{width:140px;}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#0d1b3d;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
animation:fadeOut 1s ease forwards;
animation-delay:3.5s;
}

#madeby{
color:white;
font-size:24px;
margin-bottom:15px;
}

#logo{
width:220px;
max-width:70vw;
animation:logoAnim 3s forwards;
}

@keyframes logoAnim{
0%{opacity:0;transform:scale(0.8);}
30%{opacity:1;transform:scale(1);}
70%{opacity:1;}
100%{opacity:0;transform:scale(1.05);}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div id="madeby">Made by:</div>
  <img src="buildcraft.png" id="logo">
</div>

<canvas id="canvas"></canvas>

<div id="chat"></div>

<div id="chatBox">
<input id="input" placeholder="chat...">
<button id="send">Send</button>
</div>

<div id="joyBase">
  <div id="joyStick"></div>
</div>

<script>

/* =========================
   INIT
========================= */

const socket = io();
socket.emit("join","Player_"+Math.floor(Math.random()*999));

const canvas = document.getElementById("canvas");
const engine = new BABYLON.Engine(canvas,true);
const scene = new BABYLON.Scene(engine);

/* LIGHT */
new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

/* WORLD */
BABYLON.MeshBuilder.CreateGround("g",{width:50,height:50},scene);

/* PLAYER (CUBE) */
const player = BABYLON.MeshBuilder.CreateBox("p",{size:1},scene);
player.position.y = 2;

const mat = new BABYLON.StandardMaterial("mat",scene);
mat.diffuseColor = new BABYLON.Color3(0.2,0.6,1);
player.material = mat;

/* CAMERA (FPS) */
const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0,0,0), scene);
camera.minZ = 0.1;
camera.attachControl(canvas,true);

/* LOOK */
let rotY = 0;
let lastX = 0;

canvas.addEventListener("touchstart",(e)=>{
lastX = e.touches[0].clientX;
});

canvas.addEventListener("touchmove",(e)=>{
let t = e.touches[0];
rotY -= (t.clientX - lastX) * 0.002;
lastX = t.clientX;
});

/* =========================
   JOYSTICK
========================= */

const base = document.getElementById("joyBase");
const stick = document.getElementById("joyStick");

let dx=0,dz=0,active=false;

base.addEventListener("touchstart",()=>active=true);

base.addEventListener("touchend",()=>{
active=false;
dx=0;dz=0;
stick.style.left="40px";
stick.style.top="40px";
});

base.addEventListener("touchmove",(e)=>{
if(!active) return;

let t = e.touches[0];
let r = base.getBoundingClientRect();

let x = t.clientX - r.left - 65;
let y = t.clientY - r.top - 65;

let len = Math.sqrt(x*x+y*y);
if(len>40){x=x/len*40;y=y/len*40;}

stick.style.left=(40+x)+"px";
stick.style.top=(40+y)+"px";

dx = x/40;
dz = -y/40;
});

/* =========================
   LOOP
========================= */

engine.runRenderLoop(()=>{

let forwardX = Math.sin(rotY);
let forwardZ = Math.cos(rotY);

let rightX = Math.cos(rotY);
let rightZ = -Math.sin(rotY);

/* MOVE */
player.position.x += (forwardX * dz + rightX * dx) * 0.15;
player.position.z += (forwardZ * dz + rightZ * dx) * 0.15;

/* CAMERA = EYES */
camera.position.x = player.position.x;
camera.position.y = player.position.y + 0.5;
camera.position.z = player.position.z;

scene.render();
});

window.addEventListener("resize",()=>engine.resize());

/* SPLASH REMOVE */
setTimeout(()=>{
document.getElementById("splash").remove();
},4000);

</script>

</body>
</html>
